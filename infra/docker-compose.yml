name: gustavo

services:
    postgres:
        image: postgres:17.5
        container_name: gustavo-postgres
        environment:
            POSTGRES_DB: gustavo_dev
            POSTGRES_USER: gus
            POSTGRES_PASSWORD: yellow_shirt_dev
            POSTGRES_INITDB_ARGS: '--auth-host=md5 --auth-local=md5'
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        restart: unless-stopped
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U gus -d gustavo_dev']
            interval: 30s
            timeout: 10s
            retries: 3
        networks:
            - gustavo-network

    metabase:
        image: metabase/metabase:latest
        container_name: gustavo-metabase
        environment:
            # Metabase application database configuration
            MB_DB_TYPE: postgres
            MB_DB_DBNAME: gustavo_dev
            MB_DB_PORT: 5432
            MB_DB_USER: gus
            MB_DB_PASS: yellow_shirt_dev
            MB_DB_HOST: postgres
            # Additional settings for proper persistence
            MB_ENCRYPTION_SECRET_KEY: gustavo-metabase-secret-key-2024
        ports:
            - '3001:3000'
        volumes:
            - metabase_data:/metabase-data
        depends_on:
            postgres:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - gustavo-network

volumes:
    postgres_data:
    metabase_data:

networks:
    gustavo-network:
        driver: bridge
